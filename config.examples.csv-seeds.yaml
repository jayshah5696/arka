# Example: CSV seed ingestion with baseline OpenAI-compatible config
#
# Use this when:
# - your starting data is in CSV instead of JSONL
# - you want to test the typed seed ingestion path from CSV
# - you want a simple example without the labeling filter enabled
#
# Required env vars:
# - OPENAI_API_KEY
#
# Expected CSV columns:
# - instruction
# - response
#
# Example CSV:
# instruction,response
# "Say hello","Hello"
# "Explain gravity","Gravity pulls masses together."
#
# Run with:
# uv run arka --config config.examples.csv-seeds.yaml --run-id csv-smoke
#
# Expected behavior:
# - 01_source reads CSV rows into typed ConversationRecord values
# - 02_normalize trims whitespace in payload text
# - no label quality stage is added because labeling filter is disabled
version: "1"
run_id: null

llm:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  timeout_seconds: 30
  max_retries: 3

executor:
  mode: threadpool
  max_workers: 2

data_source:
  type: seeds
  path: ./scratch/seeds.csv

generator:
  type: prompt_based
  target_count: 5
  generation_multiplier: 1

filters:
  target_count: 5
  labeling_engine:
    enabled: false

output:
  format: jsonl
  path: ./output/csv-seeds-dataset.jsonl
