version: "1"
run_id: null

llm:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  timeout_seconds: 30
  max_retries: 3

executor:
  mode: threadpool
  max_workers: 2

data_source:
  type: seeds
  path: ./seeds.jsonl

generator:
  type: prompt_based
  target_count: 1
  generation_multiplier: 1

dedup:
  exact:
    enabled: false

filters:
  target_count: 1

output:
  format: jsonl
  path: ./output/smoke-dataset.jsonl
