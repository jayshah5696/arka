# WHAT:      OpenRouter-backed Evol-Instruct example with local embeddings.
# WHEN:      Use this when you want multi-round instruction evolution from seed examples.
# REQUIRES:  OPENROUTER_API_KEY and examples/seeds/04-coding-seeds.csv.
# RUN:       uv run arka --config examples/04-evol-instruct.yaml --run-id test-04
# ARTIFACTS: runs/<run-id>/... plus ./output/04-evol-instruct-dataset.jsonl.
# TEACHES:   Multi-round Evol-Instruct lineage and evolution operators.
# COST:      medium
version: "1"
run_id: null

llm:
  provider: openai
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 30
  max_retries: 3
  openai_compatible:
    referer: https://example.com
    title: arka

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  path: ./seeds/04-coding-seeds.csv

generator:
  type: evol_instruct
  target_count: 20
  generation_multiplier: 1
  rounds: 2
  branching_factor: 2
  operators:
    - add_constraints
    - deepen
    - increase_reasoning_steps
    - breadth_mutation
  filter:
    min_edit_distance_chars: 20
    min_instruction_chars: 20
    refusal_keywords:
      - "I cannot"
      - "I'm unable"
      - "As an AI"

dedup:
  exact:
    enabled: true
  near:
    num_bands: 16
    rows_per_band: 8
    enabled: true

filters:
  target_count: 20
  length:
    enabled: true
    min_instruction_chars: 10
    max_instruction_chars: 4096
    min_response_chars: 10
    max_response_chars: 16384
  language:
    enabled: true
    allowed: [en]

embeddings:
  provider: huggingface
  model: all-MiniLM-L6-v2

output:
  format: jsonl
  path: ./output/04-evol-instruct-dataset.jsonl
