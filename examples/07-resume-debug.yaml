# WHAT:      Resume-friendly debug config for repeated OpenRouter-backed runs.
# WHEN:      Use this when you want to inspect stage artifacts and resume a killed run.
# REQUIRES:  OPENROUTER_API_KEY and examples/seeds/07-humanizer-rewrite.jsonl.
# RUN:       uv run arka --config examples/07-resume-debug.yaml --run-id test-07
# ARTIFACTS: runs/<run-id>/... plus ./output/07-resume-debug-dataset.jsonl.
# TEACHES:   Stable run-id workflow and checkpoint-backed resume behavior.
# COST:      low
version: "1"
run_id: null

llm:
  provider: openai
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 30
  max_retries: 3
  openai_compatible:
    referer: https://example.com
    title: arka

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  path: ./seeds/07-humanizer-rewrite.jsonl

generator:
  type: prompt_based
  target_count: 10
  generation_multiplier: 1

dedup:
  exact:
    enabled: false
  near:
    enabled: false
    num_bands: 16

filters:
  target_count: 10
  labeling_engine:
    enabled: true
    rubric_path: ../rubrics/sft_quality.yaml
    min_overall_score: 3.5

labeling_engine:
  rubric_path: ../rubrics/sft_quality.yaml
  mode: single

embeddings:
  provider: huggingface
  model: all-MiniLM-L6-v2

output:
  format: jsonl
  path: ./output/07-resume-debug-dataset.jsonl
