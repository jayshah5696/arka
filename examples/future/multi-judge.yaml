# WHAT:      Placeholder for a future multi-judge quality-filter example.
# WHEN:      Use this when multi-judge conflict handling lands.
# REQUIRES:  OPENROUTER_API_KEY and a future multi-judge implementation.
# RUN:       uv run arka --config examples/future/multi-judge.yaml --run-id future-multi-judge
# ARTIFACTS: runs/<run-id>/... plus ./output/future-multi-judge-dataset.jsonl.
# TEACHES:   Planned multi-judge config shape and documentation conventions.
# COST:      medium
# TODO: target slice/milestone = multi-judge labeling engine implementation.
version: "1"
run_id: null

llm:
  provider: openai
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  openai_compatible:
    referer: https://example.com
    title: arka

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  path: ../seeds/07-humanizer-rewrite.jsonl

generator:
  type: prompt_based
  target_count: 10
  generation_multiplier: 1

filters:
  target_count: 10

embeddings:
  provider: huggingface
  model: all-MiniLM-L6-v2

output:
  format: jsonl
  path: ./output/future-multi-judge-dataset.jsonl
