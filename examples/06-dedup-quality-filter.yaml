# WHAT:      Dedup plus single-judge quality filtering example.
# WHEN:      Use this when you want a more realistic quality-controlled SFT pipeline.
# REQUIRES:  OPENROUTER_API_KEY and examples/seeds/07-humanizer-rewrite.jsonl.
# RUN:       uv run arka --config examples/06-dedup-quality-filter.yaml --run-id test-06
# ARTIFACTS: runs/<run-id>/... plus ./output/06-dedup-quality-filter-dataset.jsonl.
# TEACHES:   Exact dedup, near dedup, cheap filters, and quality filtering together.
# COST:      medium
version: "1"
run_id: null

llm:
  provider: openai
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 30
  max_retries: 3
  openai_compatible:
    referer: https://example.com
    title: arka

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  path: ./seeds/07-humanizer-rewrite.jsonl

generator:
  type: prompt_based
  target_count: 10
  generation_multiplier: 2
  prompt_template: |
    You are generating SFT examples for a rewrite assistant.
    Supported user intents include proofreading, rewriting, shortening, formalizing, summarizing, and making text sound more human.

    Produce one new instruction/response pair.
    The response must be valid JSON with keys brief_rationale and final_text.

    Requirements:
    - Avoid em dashes.
    - Avoid inflated AI-sounding wording.
    - Keep the rationale short and concrete.
    - Make the final_text sound human and useful.

    Return only JSON with keys "instruction" and "response".

    Seed instruction:
    {seed_instruction}

    Seed response:
    {seed_response}

dedup:
  exact:
    enabled: true
  near:
    num_bands: 16
    rows_per_band: 8
    enabled: true

filters:
  target_count: 10
  length:
    enabled: true
    min_instruction_chars: 40
    max_instruction_chars: 4096
    min_response_chars: 40
    max_response_chars: 16384
  language:
    enabled: true
    allowed: [en]
  labeling_engine:
    enabled: true
    rubric_path: ../rubrics/sft_quality.yaml
    min_overall_score: 3.5

labeling_engine:
  rubric_path: ../rubrics/sft_quality.yaml
  mode: single

embeddings:
  provider: huggingface
  model: all-MiniLM-L6-v2

output:
  format: chatml
  path: ./output/06-dedup-quality-filter-dataset.jsonl
