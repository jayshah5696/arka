version: "1"
run_id: null

llm:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  timeout_seconds: 30
  max_retries: 3

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  path: ./seeds.jsonl

generator:
  type: prompt_based
  target_count: 10
  generation_multiplier: 2

dedup:
  exact:
    enabled: false
  near:
    enabled: false

filters:
  target_count: 10
  length:
    enabled: false
    min_instruction_chars: 10
    max_instruction_chars: 4096
    min_response_chars: 10
    max_response_chars: 16384
  language:
    enabled: false
    allowed: [en]
  # labeling_engine:
  #   enabled: true
  #   rubric_path: ./rubrics/sft_quality.yaml
  #   min_overall_score: 3.0

embeddings:
  provider: huggingface
  model: all-MiniLM-L6-v2

output:
  format: jsonl
  path: ./output/dataset.jsonl
