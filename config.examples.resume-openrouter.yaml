# Example: resume-friendly OpenRouter labeling run
#
# Use this when:
# - you want a real OpenRouter-backed run you may interrupt and resume
# - you want to inspect stage artifacts between attempts
# - you want a named run convention for iterative debugging
#
# Required env vars:
# - OPENROUTER_API_KEY
#
# Run pattern:
# 1. uv run arka --config config.examples.resume-openrouter.yaml --run-id openrouter-debug-v1
# 2. uv run arka --config config.examples.resume-openrouter.yaml --run-id openrouter-debug-v1 --resume
#
# Why this exists:
# - same config, same run_id => resume can reuse stage parquet artifacts
# - different run_id => fresh run directory for comparison
#
# Artifact focus:
# - runs/<run_id>/stages/
# - runs/<run_id>/report/run_report.json
#
# Note:
# - final dataset path can still be overwritten if you reuse output.path across runs
version: "1"
run_id: null

llm:
  provider: openai
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 30
  max_retries: 3
  openai_compatible:
    referer: https://example.com
    title: arka

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  # Replace with your real inspection/debug seed file.
  path: ./scratch/verify-seeds.jsonl

generator:
  type: prompt_based
  target_count: 3
  generation_multiplier: 1

filters:
  target_count: 3
  labeling_engine:
    enabled: true
    rubric_path: ./rubrics/sft_quality.yaml
    min_overall_score: 3.5

labeling_engine:
  rubric_path: ./rubrics/sft_quality.yaml
  mode: single

output:
  format: jsonl
  path: ./output/resume-openrouter-dataset.jsonl
