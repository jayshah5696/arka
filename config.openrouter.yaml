version: "1"
run_id: null

llm:
  provider: openai
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 30
  max_retries: 3
  openai_compatible:
    referer: https://example.com
    title: arka

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  path: ./seeds.jsonl

generator:
  type: prompt_based
  target_count: 10
  generation_multiplier: 2

filters:
  target_count: 10
  labeling_engine:
    enabled: true
    rubric_path: ./rubrics/sft_quality.yaml
    min_overall_score: 3.5

labeling_engine:
  rubric_path: ./rubrics/sft_quality.yaml
  mode: single

output:
  format: jsonl
  path: ./output/dataset.jsonl
