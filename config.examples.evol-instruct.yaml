version: "1"
run_id: null

llm:
  provider: openai
  model: gpt-4o-mini
  api_key: ${OPENAI_API_KEY}
  base_url: https://api.openai.com/v1
  timeout_seconds: 30
  max_retries: 3

executor:
  mode: threadpool
  max_workers: 4

data_source:
  type: seeds
  path: ./seeds.jsonl

generator:
  type: evol_instruct
  target_count: 20
  generation_multiplier: 1
  rounds: 2
  branching_factor: 2
  operators:
    - add_constraints
    - deepen
    - increase_reasoning_steps
    - breadth_mutation
  filter:
    min_edit_distance_chars: 20
    min_instruction_chars: 20
    refusal_keywords:
      - "I cannot"
      - "I'm unable"
      - "As an AI"

dedup:
  exact:
    enabled: true
  near:
    enabled: true

filters:
  target_count: 20
  length:
    enabled: true
    min_instruction_chars: 10
    max_instruction_chars: 4096
    min_response_chars: 10
    max_response_chars: 16384
  language:
    enabled: true
    allowed: [en]

embeddings:
  provider: huggingface
  model: all-MiniLM-L6-v2

output:
  format: jsonl
  path: ./output/evol-instruct-dataset.jsonl
