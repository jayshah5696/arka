# Slice 1.5 — Baseline + double-critic with a STRONGER critic model.
# Generator stays on gemini-3.1-flash-lite-preview; the critic uses
# gemini-3-flash via stage llm_override. This is the paper's actual setup
# (strong-vs-weak) and should produce a more meaningful rejection rate than
# the symmetric slice 1 run.
version: "1"
run_id: null

llm:
  provider: openai
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 60
  max_retries: 3
  openai_compatible:
    referer: https://github.com/jayshah5696/arka
    title: arka-simula

executor:
  mode: threadpool
  max_workers: 6

data_source:
  type: seeds
  # Personal writing-assistant seeds (humanize-rl). Pulled from outside the repo;
  # see tools/simula_eval/README.md for the copy command.
  path: ../../../scratch/simula-eval/seeds/human_seeds.jsonl

generator:
  type: prompt_based
  target_count: 150
  generation_multiplier: 2
  prompt_template: |
    You are generating supervised fine-tuning examples for a personal writing assistant.
    Tasks the assistant handles include: grammar correction on selected text, rewriting,
    summarizing context, drafting emails from a topic + intent, outlining ML-engineering
    documentation, and writing in the user's authentic voice.

    Read the seed example below as a tone reference. Produce ONE new instruction/response
    pair in the same spirit but on a different topic, varying domain and intent.

    Return ONLY valid JSON with exactly two keys: "instruction" and "response".

    Hard constraints:
    - The response must sound like a real person wrote it. No corporate fluff.
    - Avoid em dashes. Avoid magic adverbs ("simply", "actually", "really").
    - Do not start the response with "I'm thrilled / excited / delighted / happy to ...".
    - Keep the response between 40 and 600 characters.

    Seed instruction:
    {seed_instruction}

    Seed response:
    {seed_response}

dedup:
  - type: exact
  - type: near
    lsh_bands: 16

filters:
  target_count: 150
  stages:
    - type: length
      min_instruction_chars: 20
      max_instruction_chars: 2048
      min_response_chars: 40
      max_response_chars: 4096
    - type: language
      allowed: [en]
    # Simula §2.2 double-critic with a stronger critic model.
    # llm_override applies ONLY to this stage; the generator above remains on
    # the lite model. resolve_llm_override merges fields onto the top-level llm.
    - type: double_critic
      llm_override:
        model: google/gemini-3-flash-preview

embeddings:
  provider: huggingface
  model: BAAI/bge-small-en-v1.5

output:
  format: chatml
  path: ../../../scratch/simula-eval/01b-double-critic-strong/dataset.jsonl
