# Example: verify the single-judge quality filter with OpenRouter
#
# Use this when:
# - you want to prove the live labeling path is working end-to-end
# - you want a small, inspectable run with dropped.parquet + stats.json
# - you are debugging prompt/rubric/filter behavior against a real model
#
# Required env vars:
# - OPENROUTER_API_KEY
#
# Expected input:
# - a JSONL seed file at ./scratch/verify-seeds.jsonl
#   with one object per line:
#   {"instruction": "...", "response": "..."}
#
# Recommended contents:
# - at least one obviously good example
# - at least one obviously bad example
# So you can confirm both kept and dropped paths are exercised.
#
# Run with:
# uv run arka --config config.examples.verify-openrouter.yaml --run-id verify-openrouter
#
# Key artifacts:
# - runs/verify-openrouter/manifest.json
# - runs/verify-openrouter/report/run_report.json
# - runs/verify-openrouter/stages/03_label_quality/data.parquet
# - runs/verify-openrouter/stages/03_label_quality/dropped.parquet
# - runs/verify-openrouter/stages/03_label_quality/stats.json
# - output/verify-openrouter-dataset.jsonl
#
# Notes:
# - run_id controls the run artifact directory under runs/<run_id>/
# - output.path controls the final dataset file name
# - this example is intentionally small and debug-friendly
version: "1"
run_id: null

llm:
  # The current client path is OpenAI-compatible, and OpenRouter works through it.
  provider: openai
  # Example lightweight Gemini model via OpenRouter.
  model: google/gemini-3.1-flash-lite-preview
  api_key: ${OPENROUTER_API_KEY}
  base_url: https://openrouter.ai/api/v1
  timeout_seconds: 30
  max_retries: 3
  openai_compatible:
    # Optional but recommended by OpenRouter.
    referer: https://example.com
    title: arka

executor:
  # Threadpool is the current default execution mode.
  mode: threadpool
  max_workers: 4

data_source:
  # Current implemented source type for this path.
  type: seeds
  # Small verification seed set with good + bad examples.
  path: ./scratch/verify-seeds.jsonl

generator:
  # Generator config is required by the current schema even when this run only
  # exercises source -> normalize -> label quality.
  type: prompt_based
  target_count: 3
  generation_multiplier: 1

filters:
  # Target count is currently schema-level scaffolding for the broader filter pipeline.
  target_count: 3
  labeling_engine:
    # Enables the live LLM judge-based quality filter stage.
    enabled: true
    rubric_path: ./rubrics/sft_quality.yaml
    # Records below this weighted overall score are dropped.
    min_overall_score: 3.5

labeling_engine:
  # Same rubric referenced for the judge.
  rubric_path: ./rubrics/sft_quality.yaml
  # Current implementation is single-judge only.
  mode: single

output:
  format: jsonl
  # Final kept dataset. This path is independent from run_id.
  path: ./output/verify-openrouter-dataset.jsonl
